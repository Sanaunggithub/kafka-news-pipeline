<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>News Pipeline Dashboard</title>
  <link rel="stylesheet" href="/static/style.css" />
  <script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.0/chart.umd.min.js"></script>
</head>
<body>
  <div class="header">
    <div>
      <h1>News Pipeline Dashboard</h1>
      <p class="last-updated" id="last-updated">Loading...</p>
    </div>
  </div>

  <main class="container">
    <section class="stats-grid">
      <div class="stat-card">
        <div class="stat-value" id="total-articles">0</div>
        <div class="stat-label">Total Articles</div>
      </div>
      <div class="stat-card">
        <div class="stat-value" id="avg-latency">0.00</div>
        <div class="stat-label">Avg Latency (ms)</div>
      </div>
      <div class="stat-card">
        <div class="stat-value" id="top-sentiment">--</div>
        <div class="stat-label">Top Sentiment</div>
      </div>
      <div class="stat-card">
        <div class="stat-value" id="top-urgency">--</div>
        <div class="stat-label">Top Urgency</div>
      </div>
    </section>

    <section class="charts-grid">
      <div class="chart-card">
        <h3>Sentiment Distribution</h3>
        <canvas id="sentimentChart"></canvas>
      </div>
      <div class="chart-card">
        <h3>Category Distribution</h3>
        <canvas id="categoryChart"></canvas>
      </div>
      <div class="chart-card">
        <h3>Urgency Distribution</h3>
        <canvas id="urgencyChart"></canvas>
      </div>
    </section>

    <section class="sources-card">
      <h3>Top Sources</h3>
      <canvas id="sourcesChart"></canvas>
    </section>

    <section class="articles-card">
      <h2>Recent Articles</h2>
      <table class="articles-table">
        <thead>
          <tr>
            <th>ID</th>
            <th>Title</th>
            <th>Source</th>
            <th>Time</th>
            <th>Sentiment</th>
            <th>Urgency</th>
          </tr>
        </thead>
        <tbody id="articles-tbody"></tbody>
      </table>
    </section>
  </main>

  <div class="modal-overlay" id="modal-overlay" aria-hidden="true">
    <div class="modal" role="dialog" aria-modal="true">
      <div class="modal-header">
        <h2 id="modal-title">Article Details</h2>
        <button type="button" class="modal-close" id="modal-close" onclick="closeModal()">Close</button>
      </div>
      <div class="modal-body" id="modal-body"></div>
    </div>
  </div>

  <script src="/static/dashboard.js"></script>
</body>
</html>
