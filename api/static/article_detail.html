<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Article Details — News Intelligence</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #f0f4f8;
            --surface: #ffffff;
            --border: #e2e8f0;
            --border-strong: #cbd5e1;
            --text-primary: #0f172a;
            --text-secondary: #475569;
            --text-muted: #94a3b8;
            --accent: #2563eb;
            --accent-light: rgba(37, 99, 235, 0.1);
            --green: #16a34a;
            --green-light: rgba(22, 163, 74, 0.1);
            --orange: #ea580c;
            --orange-light: rgba(234, 88, 12, 0.1);
            --red: #dc2626;
            --red-light: rgba(220, 38, 38, 0.1);
            --gray-light: #f8fafc;
            --shadow-sm: 0 1px 3px rgba(0, 0, 0, 0.06);
            --shadow-md: 0 4px 16px rgba(0, 0, 0, 0.08);
            --radius: 12px;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            background: var(--bg);
            color: var(--text-primary);
            font-family: "Inter", system-ui, sans-serif;
            font-size: 14px;
            line-height: 1.6;
            -webkit-font-smoothing: antialiased;
            min-height: 100vh;
        }

        /* Header */
        .header {
            position: sticky;
            top: 0;
            z-index: 100;
            display: flex;
            align-items: center;
            justify-content: space-between;
            height: 56px;
            padding: 0 32px;
            background: rgba(240, 244, 248, 0.85);
            backdrop-filter: blur(12px);
            border-bottom: 1px solid var(--border);
        }

        .header-brand {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .brand-dot {
            width: 6px;
            height: 6px;
            border-radius: 50%;
            background: var(--accent);
            flex-shrink: 0;
        }

        .brand-name {
            font-size: 14px;
            font-weight: 600;
            color: var(--text-primary);
        }

        .brand-sub {
            font-size: 12px;
            color: var(--text-muted);
            margin-left: 4px;
        }

        .back-btn {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            padding: 6px 14px;
            border: 1px solid var(--border-strong);
            border-radius: 999px;
            background: var(--surface);
            color: var(--text-secondary);
            font-size: 13px;
            font-weight: 500;
            cursor: pointer;
            transition: all 150ms ease;
            text-decoration: none;
        }

        .back-btn:hover {
            background: var(--gray-light);
            color: var(--text-primary);
            border-color: var(--border-strong);
        }

        /* Page */
        .page {
            max-width: 1100px;
            margin: 0 auto;
            padding: 40px 32px;
        }

        /* States */
        .state-card {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            padding: 40px;
            text-align: center;
            color: var(--text-muted);
        }

        .state-card h2 {
            font-size: 16px;
            font-weight: 600;
            color: var(--text-primary);
            margin-bottom: 8px;
        }

        /* Layout */
        .detail-grid {
            display: grid;
            grid-template-columns: 1fr 320px;
            gap: 20px;
            align-items: start;
        }

        .detail-main {
            display: flex;
            flex-direction: column;
            gap: 16px;
        }

        .detail-side {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        /* Cards */
        .card {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            padding: 24px;
            box-shadow: var(--shadow-sm);
        }

        .card-title {
            font-size: 11px;
            font-weight: 600;
            color: var(--text-muted);
            letter-spacing: 0.08em;
            text-transform: uppercase;
            margin-bottom: 16px;
        }

        /* Article content */
        .article-title {
            font-size: 22px;
            font-weight: 700;
            color: var(--text-primary);
            line-height: 1.3;
            letter-spacing: -0.02em;
            margin-bottom: 8px;
        }

        .article-meta {
            font-size: 13px;
            color: var(--text-muted);
            margin-bottom: 20px;
        }

        .divider {
            height: 1px;
            background: var(--border);
            margin: 20px 0;
        }

        .article-text {
            font-size: 14px;
            color: var(--text-secondary);
            line-height: 1.8;
            white-space: pre-wrap;
        }

        .summary-text {
            font-size: 14px;
            color: var(--text-secondary);
            line-height: 1.8;
            font-style: italic;
            border-left: 3px solid var(--accent);
            padding-left: 16px;
        }

        /* Metadata rows */
        .meta-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 12px;
            padding: 10px 0;
            border-bottom: 1px solid var(--border);
            font-size: 13px;
        }

        .meta-row:last-child {
            border-bottom: none;
            padding-bottom: 0;
        }

        .meta-label {
            color: var(--text-muted);
            font-weight: 500;
            flex-shrink: 0;
        }

        .meta-value {
            color: var(--text-primary);
            font-weight: 500;
            text-align: right;
        }

        /* Badges */
        .badge {
            display: inline-flex;
            align-items: center;
            padding: 3px 10px;
            border-radius: 999px;
            font-size: 11px;
            font-weight: 600;
            letter-spacing: 0.03em;
            text-transform: uppercase;
        }

        .badge-positive,
        .badge-normal {
            background: var(--green-light);
            color: var(--green);
        }

        .badge-negative,
        .badge-urgent {
            background: var(--red-light);
            color: var(--red);
        }

        .badge-neutral {
            background: rgba(148, 163, 184, 0.15);
            color: var(--text-secondary);
        }

        .badge-high {
            background: var(--orange-light);
            color: var(--orange);
        }

        /* Tags */
        .tag-list {
            display: flex;
            flex-wrap: wrap;
            gap: 6px;
        }

        .tag {
            padding: 4px 10px;
            border-radius: 999px;
            background: var(--gray-light);
            border: 1px solid var(--border);
            color: var(--text-secondary);
            font-size: 12px;
            font-weight: 500;
        }

        .empty-tag {
            color: var(--text-muted);
            font-size: 13px;
        }

        /* Importance bar */
        .importance-bar-wrap {
            margin-top: 4px;
            height: 4px;
            background: var(--border);
            border-radius: 999px;
            overflow: hidden;
        }

        .importance-bar {
            height: 100%;
            background: var(--accent);
            border-radius: 999px;
            transition: width 600ms ease;
        }

        /* Animations */
        @keyframes fadeUp {
            from {
                opacity: 0;
                transform: translateY(8px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .detail-grid {
            animation: fadeUp 300ms ease both;
        }

        /* Scrollbar */
        ::-webkit-scrollbar {
            width: 4px;
        }

        ::-webkit-scrollbar-track {
            background: transparent;
        }

        ::-webkit-scrollbar-thumb {
            background: var(--border-strong);
            border-radius: 999px;
        }

        /* Responsive */
        @media (max-width: 900px) {
            .detail-grid {
                grid-template-columns: 1fr;
            }

            .page {
                padding: 24px 16px;
            }

            .header {
                padding: 0 16px;
            }
        }
    </style>
</head>

<body>

    <header class="header">
        <div class="header-brand">
            <span class="brand-dot"></span>
            <span class="brand-name">News Intelligence</span>
            <span class="brand-sub">/ Article</span>
        </div>
        <button class="back-btn" onclick="window.history.back()">← Back</button>
    </header>

    <main class="page">

        <div id="loading-state" class="state-card">
            <h2>Loading article…</h2>
            <p>Fetching article details.</p>
        </div>

        <div id="error-state" class="state-card" hidden>
            <h2>Failed to load</h2>
            <p id="error-message">Something went wrong.</p>
        </div>

        <div id="article-content" hidden>
            <div class="detail-grid">

                <!-- Left column -->
                <div class="detail-main">
                    <div class="card">
                        <h1 class="article-title" id="article-title">—</h1>
                        <p class="article-meta" id="article-meta">—</p>
                        <p class="card-title">Summary</p>
                        <p class="summary-text" id="article-summary">—</p>
                        <div class="divider"></div>
                        <p class="card-title">Content</p>
                        <p class="article-text" id="article-content-text">—</p>
                    </div>
                </div>

                <!-- Right column -->
                <div class="detail-side">

                    <div class="card">
                        <p class="card-title">Details</p>
                        <div class="meta-row">
                            <span class="meta-label">Source</span>
                            <span class="meta-value" id="article-source">—</span>
                        </div>
                        <div class="meta-row">
                            <span class="meta-label">Published</span>
                            <span class="meta-value" id="article-timestamp">—</span>
                        </div>
                        <div class="meta-row">
                            <span class="meta-label">Sentiment</span>
                            <span id="article-sentiment">—</span>
                        </div>
                        <div class="meta-row">
                            <span class="meta-label">Urgency</span>
                            <span id="article-urgency">—</span>
                        </div>
                        <div class="meta-row">
                            <span class="meta-label">Importance</span>
                            <span class="meta-value" id="article-importance">—</span>
                        </div>
                        <div class="importance-bar-wrap">
                            <div class="importance-bar" id="importance-bar" style="width:0%"></div>
                        </div>
                    </div>

                    <div class="card">
                        <p class="card-title">Keywords</p>
                        <div class="tag-list" id="article-keywords"></div>
                    </div>

                    <div class="card">
                        <p class="card-title">Categories</p>
                        <div class="tag-list" id="article-categories"></div>
                    </div>

                    <div class="card">
                        <p class="card-title">Companies</p>
                        <div class="tag-list" id="article-companies"></div>
                    </div>

                    <div class="card">
                        <p class="card-title">Countries</p>
                        <div class="tag-list" id="article-countries"></div>
                    </div>

                </div>
            </div>
        </div>

    </main>

    <script>
        const articleId = window.location.pathname.split("/").filter(Boolean).pop();

        function getText(value) {
            if (value === null || value === undefined) return "—";
            if (typeof value === "string") return value.trim() || "—";
            return String(value);
        }

        function getArray(value) {
            if (Array.isArray(value)) return value.filter(Boolean);
            if (typeof value === "string") return value.split(",").map(s => s.trim()).filter(Boolean);
            return [];
        }

        function badgeClass(value) {
            const v = String(value || "").toLowerCase();
            if (v === "positive") return "badge-positive";
            if (v === "negative") return "badge-negative";
            if (v === "urgent") return "badge-urgent";
            if (v === "high") return "badge-high";
            if (v === "normal") return "badge-normal";
            return "badge-neutral";
        }

        function setBadge(id, value) {
            const el = document.getElementById(id);
            const label = getText(value);
            if (label === "—") { el.textContent = "—"; return; }
            el.innerHTML = `<span class="badge ${badgeClass(label)}">${label}</span>`;
        }

        function renderTags(id, values) {
            const el = document.getElementById(id);
            const tags = getArray(values);
            if (!tags.length) {
                el.innerHTML = `<span class="empty-tag">None</span>`;
                return;
            }
            el.innerHTML = tags.map(t => `<span class="tag">${t}</span>`).join("");
        }

        function formatTime(ts) {
            if (!ts) return "—";
            const d = new Date(ts);
            return isNaN(d) ? ts : d.toLocaleString(undefined, {
                month: "short", day: "numeric", year: "numeric",
                hour: "2-digit", minute: "2-digit"
            });
        }

        async function loadArticle() {
            const loading = document.getElementById("loading-state");
            const errorState = document.getElementById("error-state");
            const content = document.getElementById("article-content");

            try {
                const res = await fetch(`/dashboard/articles/${articleId}`);
                if (!res.ok) throw new Error(`Status ${res.status}`);
                const a = await res.json();

                document.title = `${a.title || "Article"} — News Intelligence`;
                document.getElementById("article-title").textContent = getText(a.title);
                document.getElementById("article-meta").textContent =
                    `${getText(a.source)} • ${formatTime(a.timestamp)}`;
                document.getElementById("article-summary").textContent =
                    getText(a.summary) === "—" ? "No summary available." : getText(a.summary);
                document.getElementById("article-content-text").textContent =
                    getText(a.content) === "—" ? "No content available." : getText(a.content);
                document.getElementById("article-source").textContent = getText(a.source);
                document.getElementById("article-timestamp").textContent = formatTime(a.timestamp);
                document.getElementById("article-importance").textContent =
                    a.importance_score != null ? `${(a.importance_score * 100).toFixed(0)}%` : "—";
                document.getElementById("importance-bar").style.width =
                    a.importance_score != null ? `${(a.importance_score * 100).toFixed(0)}%` : "0%";

                setBadge("article-sentiment", a.sentiment);
                setBadge("article-urgency", a.urgency);
                renderTags("article-keywords", a.keywords);
                renderTags("article-categories", a.categories);
                renderTags("article-companies", a.companies);
                renderTags("article-countries", a.countries);

                loading.hidden = true;
                content.hidden = false;
            } catch (err) {
                loading.hidden = true;
                errorState.hidden = false;
                document.getElementById("error-message").textContent = err.message;
            }
        }

        document.addEventListener("DOMContentLoaded", loadArticle);
    </script>

</body>

</html>
