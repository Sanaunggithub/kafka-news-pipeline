services:
  zookeeper:
    image: confluentinc/cp-zookeeper:7.4.0
    env_file: .env
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    restart: unless-stopped
    networks:
      - pipeline-network

  kafka:
    image: confluentinc/cp-kafka:7.4.0
    env_file: .env
    depends_on:
      - zookeeper
    environment:
      KAFKA_ZOOKEEPER_CONNECT: "zookeeper:2181"
      KAFKA_LISTENERS: "PLAINTEXT://0.0.0.0:9092"
      KAFKA_ADVERTISED_LISTENERS: "PLAINTEXT://kafka:9092"
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
    ports:
      - "9092:9092"
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "bash -c '(echo > /dev/tcp/localhost/9092) >/dev/null 2>&1 || exit 1'"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - pipeline-network

  kafka-ui:
    image: provectuslabs/kafka-ui:latest
    env_file: .env
    depends_on:
      - kafka
    ports:
      - "${KAFKA_UI_PORT}:8080"
    environment:
      KAFKA_CLUSTERS_0_NAME: local
      KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS: kafka:9092
    restart: unless-stopped
    networks:
      - pipeline-network

  api:
    build:
      context: .
      dockerfile: api/Dockerfile
    env_file: .env
    depends_on:
      kafka:
        condition: service_healthy
    ports:
      - "${API_PORT}:${API_PORT}"
    volumes:
      - ./shared:/app/shared
      - ./ssl:/app/ssl
    networks:
      - pipeline-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8000/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5

  postgres:
    image: postgres:15
    env_file: .env
    restart: unless-stopped
    volumes:
      - ./postgres:/docker-entrypoint-initdb.d
      - postgres_data:/var/lib/postgresql/data 
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d news_pipeline"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - pipeline-network
    ports:
      - "${POSTGRES_EXTERNAL_PORT}:5432"
  
  qdrant:
    image: qdrant/qdrant:latest
    env_file: .env
    ports:
      - "${QDRANT_PORT}:6333"
    restart: unless-stopped
    networks:
      - pipeline-network
    volumes:
      - qdrant_data:/qdrant/storage  
  database-consumer:
    build:
      context: .
      dockerfile: consumers/database/Dockerfile
    depends_on:
      kafka:
        condition: service_healthy
      postgres:
        condition: service_healthy
    env_file: .env
    volumes:
      - ./shared:/app/shared
    networks:
      - pipeline-network
    restart: unless-stopped

  embedding-consumer:
    build:
      context: .
      dockerfile: consumers/embedding/Dockerfile
    depends_on:
      kafka:
        condition: service_healthy
    env_file: .env
    volumes:
      - ./shared:/app/shared
    networks:
      - pipeline-network
    restart: unless-stopped

  analysis-consumer:
    build:
      context: .
      dockerfile: consumers/analysis/Dockerfile
    depends_on:
      kafka:
        condition: service_healthy
    env_file: .env
    volumes:
      - ./shared:/app/shared
    networks:
      - pipeline-network
    restart: unless-stopped

  analytics-consumer:
    build:
      context: .
      dockerfile: consumers/analytics/Dockerfile
    depends_on:
      kafka:
        condition: service_healthy
      postgres:
        condition: service_healthy
    env_file: .env
    volumes:
      - ./shared:/app/shared
    networks:
      - pipeline-network
    restart: unless-stopped

networks:
  pipeline-network:
    driver: bridge
volumes:
  postgres_data:
  qdrant_data:
